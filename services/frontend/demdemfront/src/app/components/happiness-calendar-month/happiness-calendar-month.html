<div class="grid grid-cols-7 max-w-117 border-2">

  <div class="col-span-7 flex justify-between items-center px-4 py-2 bg-gray-50 border-b-2 border-gray-200"
       [class.justify-between]="enableNavigation()"
       [class.justify-center]="!enableNavigation()">

    @if (enableNavigation()) {
      <button (click)="onPrevious.emit()" class="p-1 hover:bg-gray-200 rounded-full cursor-pointer transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
    }

    <div class="font-bold text-sm text-gray-700 uppercase tracking-widest">
      {{ monthName() }}
    </div>

    @if (enableNavigation()) {
      <button (click)="onNext.emit()" class="p-1 hover:bg-gray-200 rounded-full cursor-pointer transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    }
  </div>

  @for (label of ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun']; track label) {
    <div class="sticky text-center font-bold text-xs p-1 border-b-2 border-gray-200">
      {{ label }}
    </div>
  }

  <!--TODO: Make global component with gradient definitions and add it to app.html-->
  <svg style="width:0; height:0; position:absolute;" aria-hidden="true">
    <defs>
      <linearGradient id="heart-grad-1" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="transparent" />
      </linearGradient>

      <linearGradient id="heart-grad-2" x1="0" y1="0" x2="1" y2="0">
        <stop offset="50%" stop-color="#ef4444" />
        <stop offset="50%" stop-color="transparent" />
      </linearGradient>

      <linearGradient id="heart-grad-3" x1="0" y1="0" x2="1" y2="0">
        <stop offset="100%" stop-color="#ef4444" />
      </linearGradient>
    </defs>
  </svg>

  @for (day of monthData(); track day.date) {
    <div
      class="border-r border-gray-200 nth-[7n]:border-r-0 min-h-12.5"
      [class.bg-red-50]="day.date.day() == 6 || day.date.day() == 0">

      <app-happiness-calendar-cell
        [day]="day"
        [active]="day.date.month() === viewDate().month() && day.date.year() === viewDate().year()"
        (moodSelected)="onMoodSelected(day, $event)"/>
    </div>
  }
</div>
