<div class="box-border w-full aspect-square p-1">

    <div class="relative w-full h-full flex items-center justify-center">

      <!-- Heart Icon with Day Number -->
      <svg viewBox="0 0 24 24" class="w-full h-full max-w-[90%] max-h-[90%]">
        @if (happiness() !== Happiness.unset) {
        <!-- The Heart -->
        <path
          [attr.fill]="'url(#heart-grad-' + happiness() + ')'"
          fill-opacity="0.6"
          stroke="#ef4444"
          stroke-width="1.2"
          d="M12 21s-6-4.35-9.33-8.22C-.5 7.39 3.24 1 8.4 4.28 10.08 5.32 12 7.5 12 7.5s1.92-2.18 3.6-3.22C20.76 1 24.5 7.39 21.33 12.78 18 16.65 12 21 12 21z">
        </path>
        }

        <!-- The Day Number -->
        <text
          x="50%"
          y="13"
          text-anchor="middle"
          dominant-baseline="middle"
          fill="black"
          font-weight="bold"
          style="font-size: 7px; font-family: sans-serif; pointer-events: none;">
          {{ day() }}
        </text>
      </svg>
    </div>
</div>
