<div class="relative w-full aspect-square flex items-center justify-center text-gray-400 text-xs"
     [class.opacity-40]="!active()">

  <!-- Cell Content -->
  <div class="w-full h-full" [class.cursor-pointer]="active()" (click)="togglePicking()">
    <svg viewBox="0 0 24 24" class="w-full h-full max-w-[90%] max-h-[90%]">
      @if (day().happiness !== Happiness.unset) {
        <!-- The Heart -->
        <path
          [attr.fill]="'url(#heart-grad-' + day().happiness + ')'"
          fill-opacity="0.6"
          stroke="#ef4444"
          stroke-width="1.2"
          d="M12 21s-6-4.35-9.33-8.22C-.5 7.39 3.24 1 8.4 4.28 10.08 5.32 12 7.5 12 7.5s1.92-2.18 3.6-3.22C20.76 1 24.5 7.39 21.33 12.78 18 16.65 12 21 12 21z">
        </path>
      }

      <!-- The Day Number -->
      <text
        x="50%"
        y="13"
        text-anchor="middle"
        dominant-baseline="middle"
        fill="black"
        font-weight="bold"
        style="font-size: 7px; font-family: sans-serif; pointer-events: none;">
        {{ day().date.date() }}
      </text>
    </svg>
  </div>

  <!-- Mood Picker Popup -->
  @if (isPicking()) {
    <div class="absolute z-20 bg-white border border-gray-300 shadow-xl rounded-lg p-1 flex gap-1 -top-10 left-1/2 -translate-x-1/2">
      <button (click)="selectMood(Happiness.bad); $event.stopPropagation()"
              class="hover:bg-red-100 p-1 rounded cursor-pointer transition-colors" title="Bad">😞</button>
      <button (click)="selectMood(Happiness.mid); $event.stopPropagation()"
              class="hover:bg-yellow-100 p-1 rounded cursor-pointer transition-colors" title="Mid">😐</button>
      <button (click)="selectMood(Happiness.good); $event.stopPropagation()"
              class="hover:bg-green-100 p-1 rounded cursor-pointer transition-colors" title="Good">🙂</button>
      <button (click)="selectMood(Happiness.unset); $event.stopPropagation()"
              class="hover:bg-gray-100 p-1 rounded cursor-pointer transition-colors" title="Unset">⚪</button>
    </div>

    <!-- Backdrop to close when clicking outside -->
    <div class="fixed inset-0 z-10" (click)="isPicking.set(false)"></div>
  }
</div>
