<div class="relative w-full aspect-square flex items-center justify-center text-gray-400 text-xs"
     [class.opacity-40]="!active()">

  <!-- Cell Content -->
  <div class="w-full h-full" [class.cursor-pointer]="active()" (click)="togglePicking()">
    <svg viewBox="0 0 24 24" class="w-full h-full">
      @if (day().happiness !== Happiness.unset) {
        <!-- The Heart -->
        <path
          [attr.fill]="'url(#heart-grad-' + day().happiness + ')'"
          fill-opacity="0.6"
          stroke="#ef4444"
          stroke-width="1.2"
          [attr.d]="HEART_SHAPE">
        </path>
      }

      <!-- The Day Number -->
      <text
        x="50%"
        y="13"
        text-anchor="middle"
        dominant-baseline="middle"
        fill="black"
        font-weight="bold"
        style="font-size: 7px; font-family: sans-serif; pointer-events: none;">
        {{ day().date.date() }}
      </text>
    </svg>
  </div>

  <!-- Mood Picker Popup -->
  @if (isPicking()) {
    <div [class]="alignmentClass()" class="absolute z-20 bg-white border border-gray-300 shadow-xl rounded-lg p-1 flex gap-1 -top-12">
      <!-- Bad -->
      <button (click)="selectMood(Happiness.bad); $event.stopPropagation()"
              class="hover:bg-red-50 p-1 rounded cursor-pointer transition-colors" title="Bad">
        <svg viewBox="0 0 24 24" class="w-6 h-6">
          <path fill="url(#heart-grad-1)" fill-opacity="0.6" stroke="#ef4444" stroke-width="1.2"
                [attr.d]="HEART_SHAPE"></path>
        </svg>
      </button>

      <!-- Mid -->
      <button (click)="selectMood(Happiness.mid); $event.stopPropagation()"
              class="hover:bg-yellow-50 p-1 rounded cursor-pointer transition-colors" title="Mid">
        <svg viewBox="0 0 24 24" class="w-6 h-6">
          <path fill="url(#heart-grad-2)" fill-opacity="0.6" stroke="#ef4444" stroke-width="1.2"
                [attr.d]="HEART_SHAPE"></path>
        </svg>
      </button>

      <!-- Good -->
      <button (click)="selectMood(Happiness.good); $event.stopPropagation()"
              class="hover:bg-green-50 p-1 rounded cursor-pointer transition-colors" title="Good">
        <svg viewBox="0 0 24 24" class="w-6 h-6">
          <path fill="url(#heart-grad-3)" fill-opacity="0.6" stroke="#ef4444" stroke-width="1.2"
                [attr.d]="HEART_SHAPE"></path>
        </svg>
      </button>

      <!-- Unset (Clear) -->
      <button (click)="selectMood(Happiness.unset); $event.stopPropagation()"
              class="hover:bg-gray-100 p-1 rounded cursor-pointer transition-colors" title="Clear">
        <svg viewBox="0 0 24 24" class="w-6 h-6">
          <path fill="none" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="2 2"
                [attr.d]="HEART_SHAPE"></path>
        </svg>
      </button>
    </div>

    <!-- Backdrop to close when clicking outside -->
    <div class="fixed inset-0 z-10" (click)="isPicking.set(false)"></div>
  }
</div>
